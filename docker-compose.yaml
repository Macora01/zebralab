services:
  mongodb:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    networks:
      - zebralab
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      MONGO_URL: mongodb://mongodb:27017
      DB_NAME: ${DB_NAME:-zebralab}
      CORS_ORIGINS: ${CORS_ORIGINS:-https://zebra.facore.cl}
    volumes:
      - uploads_data:/app/backend/uploads
    networks:
      - zebralab
    expose:
      - "8001"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_BACKEND_URL: ${REACT_APP_BACKEND_URL:-https://zebra.facore.cl}
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - zebralab
    ports:
      - "80"

volumes:
  mongo_data:
  uploads_data:

networks:
  zebralab:
    driver: bridge
